<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostTrace Sentinel | Triple-Vector Alignment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fira Code', monospace; background-color: #020617; color: #94a3b8; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid #1e293b; transition: all 0.3s ease; }
        .neon-border-blue { border-bottom: 2px solid #3b82f6; box-shadow: 0 4px 15px -5px #3b82f6; }
        .neon-border-red { border: 1px solid #ef4444 !important; box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
        .neon-border-green { border: 1px solid #22c55e !important; box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="auth-container" class="w-full max-w-md glass p-8 rounded-2xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white tracking-tighter italic">GHOST<span class="text-blue-500">TRACE</span></h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-2 font-bold">Governance Integrity Dashboard</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="dev-name" placeholder="OPERATOR NAME" class="w-full bg-slate-900 border border-slate-800 p-3 rounded-lg text-sm text-white focus:border-blue-500 outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-blue-900/20">INITIALIZE SESSION</button>
        </div>
    </div>

    <div id="dashboard-container" class="hidden w-full max-w-6xl space-y-6">
        <div class="flex justify-between items-end glass p-6 rounded-xl neon-border-blue">
            <div>
                <h1 class="text-xl font-bold text-white tracking-widest italic text-blue-500">SENTINEL v1.0.4</h1>
                <p class="text-[10px] text-slate-500 uppercase">ACTIVE OPERATOR: <span id="operator-name" class="text-blue-400 font-bold"></span></p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-500 uppercase font-bold">Triple-Vector Status</p>
                <p class="text-green-500 text-xs font-bold animate-pulse">● PIPELINE ONLINE</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div class="glass p-6 rounded-xl space-y-4">
                    <h2 class="text-xs font-bold text-white uppercase tracking-widest border-b border-slate-800 pb-2 italic">Policy Definition</h2>
                    
                    <div>
                        <label class="text-[10px] block mb-1 font-bold">VECTOR 1: BUSINESS REQUIREMENTS</label>
                        <textarea id="requirements" class="w-full h-24 bg-slate-950 border border-slate-800 rounded-lg p-3 text-xs text-slate-300 focus:border-blue-500 outline-none resize-none" placeholder="What does the client want?"></textarea>
                    </div>

                    <div>
                        <label class="text-[10px] block mb-1 font-bold">VECTOR 2: DESIGN SPEC (STRUCTURE)</label>
                        <textarea id="design_spec" class="w-full h-24 bg-slate-950 border border-slate-800 rounded-lg p-3 text-xs text-slate-300 focus:border-blue-500 outline-none resize-none" placeholder="Architectural pattern (e.g. MVC, Blue buttons)"></textarea>
                    </div>

                    <div>
                        <label class="text-[10px] block mb-1 font-bold">VECTOR 2 (VISUAL): DESIGN IMAGE</label>
                        <input type="file" id="design-image" class="text-[10px] text-slate-500 file:bg-blue-600 file:text-white file:border-0 file:rounded file:px-3 file:py-1 file:font-bold hover:file:bg-blue-500">
                    </div>

                    <button onclick="syncSentinel()" id="sync-btn" class="w-full bg-slate-100 hover:bg-white text-black text-[10px] font-black py-4 rounded uppercase transition-all tracking-widest">
                        Sync Governance Context
                    </button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="audit-card" class="glass h-full min-h-[400px] rounded-xl p-8 flex flex-col items-center justify-center text-center">
                    <div class="absolute top-4 right-6">
                        <span id="badge-status" class="px-3 py-1 rounded bg-slate-800 text-[10px] font-bold uppercase tracking-widest">Waiting</span>
                    </div>
                    <div id="status-icon" class="text-6xl mb-4 opacity-40">📡</div>
                    <h3 id="status-headline" class="text-3xl font-black text-white italic tracking-tighter uppercase">Awaiting Git Commit</h3>
                    <div id="audit-details" class="max-w-xl text-xs text-slate-500 leading-relaxed mt-4 whitespace-pre-wrap">
                        Sentinel is monitoring Vector 3 (Code). Stage your files and execute <code class="bg-black px-2 py-1 rounded text-blue-400">git commit</code> to begin alignment audit.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "http://127.0.0.1:8000";
        let currentDev = "";

        function handleLogin() {
            const name = document.getElementById('dev-name').value;
            if (!name) return alert("Operator Name Required.");
            currentDev = name;
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('dashboard-container').classList.remove('hidden');
            document.getElementById('operator-name').innerText = name;
        }

        async function syncSentinel() {
            const reqs = document.getElementById('requirements').value;
            const spec = document.getElementById('design_spec').value;
            const imgFile = document.getElementById('design-image').files[0];
            const btn = document.getElementById('sync-btn');

            if (!reqs || !imgFile || !spec) return alert("All Vectors (Requirements & Design) are mandatory.");

            btn.innerText = "UPLOADING CONTEXT...";
            const formData = new FormData();
            formData.append('requirements', reqs);
            formData.append('design_spec', spec);
            formData.append('design_image', imgFile);

            try {
                const res = await fetch(`${BASE_URL}/api/sync`, { method: 'POST', body: formData });
                if(res.ok) {
                    btn.innerText = "SENTINEL ARMED";
                    btn.className = "w-full bg-green-600 text-white text-[10px] font-black py-4 rounded uppercase tracking-widest";
                }
            } catch (e) { alert("Communication Error. Ensure server.py is running."); }
        }

        async function pollReport() {
            try {
                const res = await fetch(`${BASE_URL}/api/report`);
                const data = await res.json();
                
                const card = document.getElementById('audit-card');
                const badge = document.getElementById('badge-status');
                const headline = document.getElementById('status-headline');
                const details = document.getElementById('audit-details');
                const icon = document.getElementById('status-icon');

                // Corrected: Matching status keys from your judge_engine.py
                if (data.status === "FAILED") {
                    card.className = "glass h-full min-h-[400px] rounded-xl p-8 flex flex-col items-center justify-center text-center neon-border-red";
                    badge.className = "px-3 py-1 rounded bg-red-600 text-white text-[10px] font-bold uppercase tracking-widest";
                    badge.innerText = "Alignment Gap";
                    icon.innerText = "🛡️"; icon.classList.remove('opacity-40');
                    headline.innerText = "COMMIT BLOCKED";
                    headline.style.color = "#ef4444";
                    details.innerText = data.message;
                    details.className = "max-w-xl text-[11px] text-red-400 bg-red-950/20 p-6 rounded mt-4 border border-red-900/30 text-left overflow-y-auto max-h-[250px]";
                } 
                else if (data.status === "SUCCESS") {
                    card.className = "glass h-full min-h-[400px] rounded-xl p-8 flex flex-col items-center justify-center text-center neon-border-green";
                    badge.className = "px-3 py-1 rounded bg-green-600 text-white text-[10px] font-bold uppercase tracking-widest";
                    badge.innerText = "Aligned";
                    icon.innerText = "🚀"; icon.classList.remove('opacity-40');
                    headline.innerText = "VERIFIED";
                    headline.style.color = "#22c55e";
                    details.innerText = data.message || "Requirement, Design, and Code are in perfect sync.";
                    details.className = "max-w-xl text-[11px] text-green-400 mt-4";
                }
            } catch (e) { /* Console logs for debugging can go here */ }
        }
        setInterval(pollReport, 2000);
    </script>
</body>
</html>
